name: Zephyr CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf python3-pip python3-venv

      - name: Set up Python environment
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip

      - name: Zephyr build placeholder (documented)
        run: |
          echo "=================================================="
          echo "Zephyr CI is intentionally container-based"
          echo "Full build requires Zephyr SDK or Docker environment"
          echo "This pipeline validates CI structure only"
          echo "=================================================="
